<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Odds Agent</title>
  <style>
    :root { font-family: system-ui, sans-serif; line-height: 1.45; color: #0f172a; background: #f8fafc; }
    body { max-width: 52rem; margin: 0 auto; padding: 1.25rem; }
    h1 { font-size: 1.35rem; margin: 0 0 0.5rem; }
    button {
      background: #0f172a; color: #fff; border: 0; padding: 0.5rem 1rem;
      border-radius: 6px; cursor: pointer; font-size: 0.95rem;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    section { margin-top: 1.5rem; }
    pre, .trace {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;
      padding: 0.75rem; overflow-x: auto; font-size: 0.8rem;
    }
    textarea {
      width: 100%; min-height: 3rem; padding: 0.5rem; border-radius: 6px;
      border: 1px solid #cbd5e1; font: inherit; box-sizing: border-box;
    }
    .row { display: flex; gap: 0.5rem; align-items: flex-start; flex-wrap: wrap; }
    .muted { color: #64748b; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>Odds Agent</h1>
  <p class="muted">Sample slate briefing + follow-up chat. Open agent activity to see tool calls.</p>

  <div class="row">
    <button type="button" id="run-brief">Run daily briefing</button>
    <span class="muted" id="thread-label"></span>
  </div>

  <section>
    <h2 style="font-size:1rem;">Briefing</h2>
    <pre id="briefing">—</pre>
  </section>

  <section>
    <h2 style="font-size:1rem;">Agent activity</h2>
    <details id="trace-wrap">
      <summary>Show tool trace</summary>
      <pre class="trace" id="trace">—</pre>
    </details>
  </section>

  <section>
    <h2 style="font-size:1rem;">Follow-up</h2>
    <textarea id="chat-input" placeholder="Ask about the briefing…" disabled></textarea>
    <p><button type="button" id="send-chat" disabled>Send</button></p>
    <pre id="chat-log">—</pre>
  </section>

  <script>
    const $ = (id) => document.getElementById(id);
    let threadId = null;

    async function parseJsonResponse(r) {
      const text = await r.text();
      const ct = r.headers.get("content-type") || "";
      if (ct.includes("application/json")) {
        try { return JSON.parse(text); } catch (_) { /* fall through */ }
      }
      throw new Error(text.slice(0, 200) || r.statusText);
    }

    function setBusy(b) {
      $("run-brief").disabled = b;
      $("send-chat").disabled = b || !threadId;
      $("chat-input").disabled = b || !threadId;
    }

    $("run-brief").onclick = async () => {
      setBusy(true);
      $("briefing").textContent = "Loading…";
      $("trace").textContent = "—";
      try {
        const r = await fetch("/api/brief", { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" });
        const data = await parseJsonResponse(r);
        if (!r.ok) throw new Error(data.detail || r.statusText);
        threadId = data.thread_id;
        $("thread-label").textContent = "thread: " + threadId;
        $("briefing").textContent = JSON.stringify(data.briefing, null, 2);
        $("trace").textContent = JSON.stringify(data.tool_trace, null, 2);
        $("trace-wrap").open = true;
        $("chat-log").textContent = "—";
      } catch (e) {
        $("briefing").textContent = "Error: " + e.message;
      } finally {
        setBusy(false);
      }
    };

    $("send-chat").onclick = async () => {
      const text = $("chat-input").value.trim();
      if (!text || !threadId) return;
      setBusy(true);
      const prev = $("chat-log").textContent;
      $("chat-log").textContent = "Thinking…";
      try {
        const r = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ thread_id: threadId, message: text }),
        });
        const data = await parseJsonResponse(r);
        if (!r.ok) throw new Error(data.detail || r.statusText);
        $("chat-log").textContent =
          (prev && prev !== "—" ? prev + "\n\n---\n\n" : "") +
          "You: " + text + "\n\nAgent: " + data.reply +
          "\n\n(tools: " + JSON.stringify(data.tool_trace) + ")";
        $("chat-input").value = "";
      } catch (e) {
        $("chat-log").textContent = prev + "\n\nError: " + e.message;
      } finally {
        setBusy(false);
      }
    };
  </script>
</body>
</html>
